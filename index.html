<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SA Study">
<title>SA Upskill — Study Command Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050810;--s1:#080d1c;--s2:#0d1424;--s3:#141e35;
  --border:#1e2d4a;--b2:#243456;
  --txt:#dce7f8;--t2:#8892b0;--t3:#4a5568;
  --H:#b57bee;--Hbg:#1a0a35;--Hb:#7c3aed;
  --L:#00e5c3;--Lbg:#001a15;--Lb:#059669;
  --R:#ff8c42;--Rbg:#1e0a00;--Rb:#c2410c;
  --xp:#ffd60a;--done:#06d6a0;--prog:#3b82f6;--red:#ef233c;--blue:#38bdf8;
  --font:'Syne',sans-serif;--mono:'Inconsolata',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:13px}
button{cursor:pointer;font-family:var(--font);border:none;outline:none}
textarea,input,select{font-family:var(--font);outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* ── SYNC BAR ── */
#sync-bar{position:fixed;top:0;left:0;right:0;height:2px;z-index:200;pointer-events:none}
#sync-bar.active{background:linear-gradient(90deg,transparent,var(--xp),transparent);animation:sb 1.2s infinite}
@keyframes sb{0%,100%{opacity:.4}50%{opacity:1}}

.nav{display:flex;align-items:center;gap:4px;padding:8px 14px;background:rgba(8,13,28,.97);border-bottom:1px solid var(--border);z-index:50;flex-wrap:wrap;min-height:48px}
.nav-brand{display:flex;align-items:center;gap:8px;margin-right:12px}
.nav-pi{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--H),var(--L));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-title{font-size:12px;font-weight:700}
.nav-sub{font-size:9px;color:var(--t2);font-family:var(--mono)}
.tab{padding:5px 11px;border-radius:6px;font-size:11px;font-weight:700;background:transparent;color:var(--t2);border:1px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--txt);border-color:var(--b2)}
.tab.on{color:#000}
.tab.on.t-map{background:linear-gradient(135deg,var(--H),#a78bfa)}
.tab.on.t-plan{background:linear-gradient(135deg,#1e40af,var(--blue))}
.tab.on.t-kanban{background:linear-gradient(135deg,#065f46,var(--L))}
.tab.on.t-dash{background:linear-gradient(135deg,#92400e,var(--xp))}
.tab.on.t-assess{background:linear-gradient(135deg,var(--red),#f97316)}
.tab.on.t-p2{background:linear-gradient(135deg,#0f766e,#06b6d4)}
.xp-row{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px}
.xp-val{color:var(--xp);font-weight:700}
.streak-val{color:#f97316;font-weight:700}
.lvl-badge{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;background:linear-gradient(135deg,var(--xp),var(--R));color:#000}
#sync-dot{font-size:10px;font-family:var(--mono);color:var(--t3)}

.page{display:none;height:calc(100vh - 48px);overflow:hidden}
.page.on{display:flex;flex-direction:column}
.scroll{overflow-y:auto;flex:1;padding:14px}
#pg-map{position:relative;overflow:hidden}
#map-svg-wrap{width:100%;height:100%;cursor:grab}
#map-svg-wrap:active{cursor:grabbing}
#map-svg{width:100%;height:100%}
.map-top{position:absolute;top:12px;left:12px;z-index:10;display:flex;flex-direction:column;gap:8px}
.map-legend{background:rgba(8,13,28,.92);border:1px solid var(--border);border-radius:10px;padding:10px 13px}
.map-legend-title{font-size:9px;font-weight:800;font-family:var(--mono);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.map-legend-row{display:flex;align-items:center;gap:7px;font-size:9px;color:var(--t2);margin-bottom:3px;font-family:var(--mono)}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.map-filters{background:rgba(8,13,28,.92);border:1px solid var(--border);border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.mf-label{font-size:9px;font-weight:800;color:var(--t2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.mf-btn{padding:3px 10px;border-radius:5px;font-size:9px;font-weight:700;background:var(--s2);color:var(--t2);border:1px solid var(--border);font-family:var(--mono);text-align:left}
.mf-btn.on{background:var(--s3);color:var(--txt);border-color:var(--b2)}
.mf-btn.on.fH{background:var(--Hbg);color:var(--H);border-color:var(--Hb)}
.mf-btn.on.fL{background:var(--Lbg);color:var(--L);border-color:var(--Lb)}
.mf-btn.on.fR{background:var(--Rbg);color:var(--R);border-color:var(--Rb)}
.mf-btn.on.fDone{background:rgba(6,214,160,.1);color:var(--done);border-color:var(--done)}
.map-ctrls{position:absolute;bottom:16px;right:16px;z-index:10;display:flex;gap:6px}
.mc-btn{padding:6px 12px;border-radius:7px;background:rgba(8,13,28,.9);border:1px solid var(--border);color:var(--t2);font-size:10px;font-family:var(--mono)}
.map-stats{position:absolute;bottom:16px;left:12px;z-index:10;background:rgba(8,13,28,.92);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-family:var(--mono);font-size:9px;color:var(--t2)}
.map-stats span{color:var(--xp);font-weight:700}
.plan-intro{background:var(--s1);border-radius:10px;padding:12px 16px;margin-bottom:14px;border-left:3px solid var(--L);display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.plan-intro-val{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--xp)}
.plan-intro-label{font-size:9px;color:var(--t2);font-family:var(--mono)}
.week-block{margin-bottom:16px}
.week-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.week-num{font-family:var(--mono);font-size:10px;font-weight:700;background:var(--s2);padding:3px 10px;border-radius:20px;color:var(--t2)}
.week-dates{font-size:11px;color:var(--t2)}
.week-milestone{font-size:9px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(255,214,10,.08);color:var(--xp);border:1px solid rgba(255,214,10,.2)}
.week-prog{margin-left:auto;font-size:10px;font-family:var(--mono)}
.day-row{background:var(--s1);border-radius:9px;margin-bottom:5px;border:1px solid var(--border);overflow:hidden}
.day-row:hover{border-color:var(--b2)}
.day-hdr{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid var(--border);background:var(--s2)}
.day-num{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3)}
.day-date{font-size:11px;font-weight:700}
.day-dow{font-size:9px;color:var(--t2);font-family:var(--mono)}
.day-topics{display:flex;flex-wrap:wrap;gap:5px;padding:7px 12px}
.dtc{padding:4px 9px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;border:1px solid transparent}
.dtc.leg-H{background:var(--Hbg);color:var(--H);border-color:rgba(181,123,238,.2)}
.dtc.leg-L{background:var(--Lbg);color:var(--L);border-color:rgba(0,229,195,.2)}
.dtc.leg-R{background:var(--Rbg);color:var(--R);border-color:rgba(255,140,66,.2)}
.dtc.done-c{opacity:.55;text-decoration:line-through}
.dtc:hover{filter:brightness(1.2);transform:translateY(-1px)}
.dtc-cb{width:12px;height:12px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dtc-cb.on{background:currentColor}
.day-special{padding:8px 12px;font-size:10px;color:var(--blue);font-weight:600}
#pg-kanban .scroll{padding:0}
.kanban-wrap{display:flex;gap:10px;padding:14px;height:100%;overflow-x:auto;align-items:flex-start}
.kb-col{min-width:210px;max-width:210px;background:var(--s1);border-radius:10px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;flex-direction:column}
.kb-col-hdr{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--s2)}
.kb-col-title{font-size:9px;font-weight:800;font-family:var(--mono)}
.kb-col-prog{font-size:9px;font-family:var(--mono);color:var(--t2)}
.kb-cards{padding:6px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 120px)}
.kb-card{border-radius:7px;padding:7px 8px;cursor:pointer;transition:all .15s;border:1px solid transparent;position:relative;overflow:hidden}
.kb-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kb-card.leg-H{background:var(--Hbg);border-color:rgba(181,123,238,.2)}
.kb-card.leg-H::before{background:var(--H)}
.kb-card.leg-L{background:var(--Lbg);border-color:rgba(0,229,195,.2)}
.kb-card.leg-L::before{background:var(--L)}
.kb-card.leg-R{background:var(--Rbg);border-color:rgba(255,140,66,.2)}
.kb-card.leg-R::before{background:var(--R)}
.kb-card.done{opacity:.5;filter:grayscale(.3)}
.kb-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.kb-card-top{display:flex;justify-content:space-between;margin-bottom:3px}
.kb-card-id{font-family:var(--mono);font-size:8px;font-weight:700;opacity:.7}
.kb-card-day{font-family:var(--mono);font-size:8px;color:var(--t3)}
.kb-card-name{font-size:9px;font-weight:700;line-height:1.35;margin-bottom:4px}
.kb-card-status{font-size:8px;font-family:var(--mono);padding:1px 6px;border-radius:3px;display:inline-block}
.sNS{background:rgba(100,116,139,.15);color:#64748b}
.sIP{background:rgba(59,130,246,.15);color:#60a5fa}
.sDone{background:rgba(6,214,160,.15);color:var(--done)}
.sNR{background:rgba(239,35,60,.15);color:var(--red)}
.kb-milestone{margin:3px 0;padding:4px 7px;border-radius:5px;background:rgba(255,214,10,.06);border:1px solid rgba(255,214,10,.15);font-size:8px;font-weight:700;color:var(--xp);text-align:center}
.kb-special{padding:5px 7px;border-radius:6px;background:rgba(56,189,248,.06);border:1px solid rgba(56,189,248,.15);font-size:8px;font-weight:600;color:var(--blue)}
.dash-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.d-stat{background:var(--s1);border-radius:10px;padding:13px;border:1px solid var(--border)}
.d-stat-label{font-size:10px;color:var(--t2);font-family:var(--mono);margin-bottom:6px}
.d-stat-val{font-size:26px;font-weight:800;font-family:var(--mono);line-height:1}
.d-stat-sub{font-size:9px;color:var(--t3);font-family:var(--mono);margin-top:4px}
.pbar{background:var(--s3);border-radius:99px;overflow:hidden;margin:5px 0}
.pbar-fill{border-radius:99px;transition:width .5s ease}
.dash-mid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.d-leg{background:var(--s1);border-radius:10px;padding:13px;border:1px solid var(--border)}
.d-leg-title{font-size:11px;font-weight:700;margin-bottom:8px}
.d-leg-pct{font-size:22px;font-weight:800;font-family:var(--mono);line-height:1;margin-bottom:5px}
.d-leg-sub{font-size:9px;color:var(--t2);font-family:var(--mono)}
.level-card{background:var(--s1);border-radius:10px;padding:13px;border:1px solid var(--border)}
.lv-name{font-size:15px;font-weight:800;color:var(--xp);margin-bottom:6px}
.lv-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:8px}
.lv-row{padding:3px 6px;border-radius:4px;background:var(--s2);font-size:8px;font-family:var(--mono)}
.lv-row.cur{background:rgba(255,214,10,.1);color:var(--xp);font-weight:700}
.milestones-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.m-card{background:var(--s1);border-radius:10px;padding:11px;border:1px solid var(--border);border-top:3px solid transparent}
.m-card.hit{box-shadow:0 0 16px rgba(6,214,160,.1)}
.m-label{font-size:9px;font-weight:800;font-family:var(--mono);margin-bottom:2px}
.m-date{font-size:8px;color:var(--t2);font-family:var(--mono);margin-bottom:6px}
.m-pct{font-size:18px;font-weight:800;font-family:var(--mono)}
.m-sub{font-size:8px;color:var(--t3);font-family:var(--mono);margin-top:2px}
.badges-section{background:var(--s1);border-radius:10px;padding:13px;margin-bottom:14px;border:1px solid var(--border)}
.badges-title{font-size:11px;font-weight:700;color:var(--xp);margin-bottom:10px}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:4px}
.badge{text-align:center;padding:5px 3px;border-radius:6px;background:var(--s2);border:1px solid var(--border);cursor:pointer}
.badge.earned{border-color:var(--xp);box-shadow:0 0 8px rgba(255,214,10,.12)}
.badge:not(.earned){opacity:.22;filter:grayscale(1)}
.badge-icon{font-size:14px;display:block;margin-bottom:2px}
.badge-id{font-size:7px;font-family:var(--mono);color:var(--t3)}
.streak-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;margin-top:6px}
.streak-sq{height:12px;border-radius:2px;background:var(--s3)}
.streak-sq.on{background:var(--done)}
.assess-nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.aw-btn{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;background:var(--s2);color:var(--t2);border:1px solid var(--border);font-family:var(--mono)}
.aw-btn.on{background:var(--red);color:#fff;border-color:var(--red)}
.aw-btn.done{border-color:var(--done);color:var(--done)}
.quiz-box{background:var(--s1);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.quiz-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 16px;border-bottom:1px solid var(--border)}
.quiz-title{font-size:13px;font-weight:800;margin-bottom:3px}
.quiz-meta{font-size:10px;color:var(--t2);font-family:var(--mono)}
.quiz-timer{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--xp)}
.quiz-timer.urgent{color:var(--red);animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.quiz-body{padding:16px}
.q-item{margin-bottom:14px;padding:11px;background:var(--s2);border-radius:9px;border:1px solid var(--border)}
.q-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.q-num{font-family:var(--mono);font-size:9px;color:var(--t2)}
.q-type{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px}
.q-type.scenario{background:rgba(255,140,66,.15);color:var(--R)}
.q-type.recall{background:rgba(56,189,248,.15);color:var(--blue)}
.q-type.handson{background:rgba(6,214,160,.15);color:var(--done)}
.q-text{font-size:11.5px;font-weight:600;line-height:1.55;margin-bottom:9px}
.q-ans{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:7px;padding:8px 11px;color:var(--txt);font-size:11px;resize:vertical;min-height:75px}
.q-ans:focus{border-color:var(--R)}
.quiz-footer{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-top:1px solid var(--border)}
.q-submit{padding:7px 18px;border-radius:7px;background:var(--red);color:#fff;font-size:11px;font-weight:700}
.quiz-start{text-align:center;padding:28px 16px}
.q-start-btn{padding:9px 24px;border-radius:8px;background:linear-gradient(135deg,var(--red),#f97316);color:#fff;font-weight:700;font-size:12px}
.quiz-reflection{margin-top:12px;padding:11px 13px;background:rgba(56,189,248,.05);border:1px solid rgba(56,189,248,.2);border-radius:9px}
.refl-title{font-size:10px;font-weight:700;color:var(--blue);font-family:var(--mono);margin-bottom:7px}
.refl-prompt{background:var(--s3);border-radius:6px;padding:9px 11px;font-family:var(--mono);font-size:10px;color:var(--blue);line-height:1.7}
.score-display{font-size:36px;font-weight:800;font-family:var(--mono);text-align:center;margin:10px 0}
.p2-banner{background:linear-gradient(135deg,rgba(15,118,110,.2),rgba(6,182,212,.1));border:1px solid rgba(20,184,166,.3);border-radius:10px;padding:16px;margin-bottom:16px}
.p2-banner-title{font-size:18px;font-weight:800;color:#14b8a6;margin-bottom:4px}
.p2-banner-sub{font-size:11px;color:var(--t2)}
.p2-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.p2-card{background:var(--s1);border-radius:10px;border:1px solid var(--border);padding:14px;opacity:.75}
.p2-icon{font-size:22px;margin-bottom:7px}
.p2-title{font-size:12px;font-weight:800;color:#14b8a6;margin-bottom:7px}
.p2-list{list-style:none;font-size:10px;color:var(--t2);line-height:2}
.p2-list li::before{content:'○  ';color:var(--t3)}
.p2-note{margin-top:9px;padding:6px 10px;border-radius:6px;background:rgba(15,118,110,.08);border:1px dashed rgba(20,184,166,.2);font-size:9px;color:rgba(20,184,166,.6);font-family:var(--mono)}
.overlay{position:fixed;inset:0;background:rgba(5,8,16,.88);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{background:var(--s2);border-radius:14px;border:1px solid var(--b2);width:100%;max-width:660px;max-height:90vh;overflow-y:auto;position:relative;animation:mIn .2s ease}
@keyframes mIn{from{transform:scale(.93) translateY(16px);opacity:0}to{transform:scale(1);opacity:1}}
.modal-close{position:absolute;top:12px;right:12px;background:var(--s3);color:var(--t2);width:26px;height:26px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:10}
.modal-body{padding:20px}
.topic-name{font-size:17px;font-weight:800;line-height:1.25;margin-bottom:12px}
.status-sel{padding:5px 10px;border-radius:6px;font-size:10px;font-weight:700;background:var(--s3);border:1px solid var(--b2);color:var(--txt);font-family:var(--mono)}
.ts{margin-bottom:13px}
.ts-label{font-size:9px;font-weight:800;color:var(--t2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.ts-box{font-size:11px;line-height:1.7;background:var(--s3);border-radius:8px;padding:9px 12px}
.ts-insight{background:rgba(255,214,10,.05);border:1px solid rgba(255,214,10,.15);border-radius:8px;padding:9px 12px;font-size:11px;color:var(--xp);line-height:1.7}
.handson-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;margin-bottom:5px}
.h-audit{background:rgba(56,189,248,.15);color:var(--blue)}
.h-lab{background:rgba(0,229,195,.15);color:var(--L)}
.h-deliverable{background:rgba(255,140,66,.15);color:var(--R)}
.notes-area{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:8px;padding:9px 12px;color:var(--txt);font-size:11px;resize:vertical;min-height:80px;line-height:1.6}
.notes-area:focus{border-color:var(--prog)}
.url-row{display:flex;gap:6px;align-items:center}
.url-inp{flex:1;background:var(--s3);border:1px solid var(--b2);border-radius:7px;padding:6px 10px;color:var(--txt);font-size:10px;font-family:var(--mono)}
.url-open-btn{padding:5px 11px;border-radius:6px;background:rgba(255,214,10,.1);color:var(--xp);font-size:10px;font-weight:700;border:1px solid rgba(255,214,10,.3);text-decoration:none;white-space:nowrap}
.conn-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}

const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFseHRsenhianB4eGRycG9obnZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTM3NTUsImV4cCI6MjA5MDAyOTc1NX0.7B41JEAgwt0LmubRQoq4csfTdH4J_I2DXUzHe7iGZkw';
const SUPA_ROW = 'sa_study_v1';
const SUPA_EP  = SUPA_URL + '/rest/v1/tracker_data';

let S = { done:{}, notes:{}, status:{}, url:{}, assessAnswers:{}, assessScores:{}, xp:0, streak:0, lastActive:null };
let _syncing = false;

function lsGet(k,fb){ try{ const v=localStorage.getItem(k); return v!=null?JSON.parse(v):fb; }catch(e){ return fb; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

function sHeaders(){
  return { 'Content-Type':'application/json', 'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY, 'Prefer':'resolution=merge-duplicates' };
}

function syncDot(msg,c){
  const el=document.getElementById('sync-dot');
  if(el){ el.textContent=msg; el.style.color=c||'var(--t3)'; }
}

async function cloudLoad(){
  if(_syncing) return; _syncing=true;
  try{
    const r=await fetch(SUPA_EP+'?id=eq.'+SUPA_ROW+'&select=data,updated_at',{headers:sHeaders()});
    if(!r.ok){ _syncing=false; return; }
    const rows=await r.json();
    if(!rows.length){ await cloudSave(); _syncing=false; return; }
    const cloud=JSON.parse(rows[0].data||'{}');
    const cTs=cloud.lastUpdated||0, lTs=S.lastUpdated||0;
    if(cTs>lTs){
      S=cloud;
      lsSet('sa_study',S);
      syncDot('⇄ '+new Date().toLocaleTimeString(),'var(--done)');
      refreshNav();
      if(currentTab==='plan') renderPlan();
      if(currentTab==='kanban') renderKanban();
      if(currentTab==='dash') renderDash();
      if(currentTab==='map') renderMap();
      if(currentTab==='assess'){ renderAssessNav(); renderAssessBody(); }
    } else {
      syncDot('✓ '+new Date().toLocaleTimeString(),'var(--t3)');
    }
  }catch(e){ syncDot('○','var(--t3)'); }
  _syncing=false;
}

let _saveTimer=null;
function schedSave(){ clearTimeout(_saveTimer); _saveTimer=setTimeout(cloudSave,1500); }

async function cloudSave(){
  S.lastUpdated=Date.now();
  lsSet('sa_study',S);
  syncDot('↑','var(--xp)');
  document.getElementById('sync-bar').className='active';
  try{
    const r=await fetch(SUPA_EP,{
      method:'POST', headers:sHeaders(),
      body:JSON.stringify({ id:SUPA_ROW, data:JSON.stringify(S), updated_at:new Date().toISOString() })
    });
    if(r.ok||r.status===201) syncDot('✓','var(--done)');
    else syncDot('↯','var(--red)');
  }catch(e){ syncDot('○','var(--t3)'); }
  document.getElementById('sync-bar').className='';
}

function initSync(){
  S = lsGet('sa_study', S);
  refreshNav();
  setTimeout(cloudLoad, 800);
  setInterval(cloudLoad, 5000);
}

// STATE HELPERS

function topicDone(id){ return !!S.done[id]; }
function topicStatus(id){ return S.status[id]||'Not Started'; }
function doneCount(){ return TOPICS.filter(t=>topicDone(t.id)).length; }
function legDone(leg){ return TOPICS.filter(t=>t.leg===leg&&topicDone(t.id)).length; }
function legTotal(leg){ return TOPICS.filter(t=>t.leg===leg).length; }

function markDone(id,val){
  const was=topicDone(id);
  S.done[id]=val;
  if(val&&!was){ S.xp+=50; S.status[id]='Done'; }
  else if(!val&&was){ S.xp=Math.max(0,S.xp-50); if(S.status[id]==='Done') S.status[id]='Not Started'; }
  updateStreak();
  schedSave();
  refreshNav();
  if(currentTab==='plan') renderPlan();
  if(currentTab==='kanban') renderKanban();
  if(currentTab==='dash') renderDash();
  renderMap();
}

function changeStatus(id,val){
  S.status[id]=val;
  if(val==='Done'&&!topicDone(id)) markDone(id,true);
  else if(val!=='Done'&&topicDone(id)) markDone(id,false);
  else{ schedSave(); refreshNav(); }
}

function updateStreak(){
  const today=new Date().toDateString();
  if(S.lastActive!==today){
    const yest=new Date(Date.now()-86400000).toDateString();
    S.streak=S.lastActive===yest?S.streak+1:1;
    S.lastActive=today;
  }
}

function saveAnswer(week,qi,answer){
  S.assessAnswers[week+'-'+qi]=answer;
  schedSave();
}
function saveScore(week,score){
  S.assessScores[week]=score;
  schedSave();
}

const XP_LEVELS=[
  {name:'Rookie',min:0,max:499},{name:'Associate SA',min:500,max:1499},
  {name:'Sr. SA',min:1500,max:2999},{name:'Principal',min:3000,max:4999},
  {name:'Trusted Advisor',min:5000,max:99999}
];
function getLevel(xp){ return XP_LEVELS.find(l=>xp>=l.min&&xp<=l.max)||XP_LEVELS[0]; }

function refreshNav(){
  document.getElementById('xp-el').textContent=S.xp+' XP';
  document.getElementById('streak-el').textContent='🔥 '+S.streak;
  document.getElementById('lvl-el').textContent=getLevel(S.xp).name;
  document.getElementById('map-done-count').textContent=doneCount();
  document.getElementById('map-xp-count').textContent=S.xp;
}

function lc(leg){ return{H:'var(--H)',L:'var(--L)',R:'var(--R)'}[leg]||'#fff'; }
function lbg(leg){ return{H:'var(--Hbg)',L:'var(--Lbg)',R:'var(--Rbg)'}[leg]||'#0d1424'; }
function pbar(pct,color,h=6){ return`<div class="pbar" style="height:${h}px"><div class="pbar-fill" style="width:${Math.min(100,Math.round(pct))}%;background:${color};height:${h}px"></div></div>`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function scCls(s){ return{Done:'sDone','In Progress':'sIP','Needs Revisit':'sNR'}[s]||'sNS'; }

let mt={x:0,y:0,s:1},mDrag=false,mLast={x:0,y:0},mapFilter='all';

function renderMap(){
  const wrap=document.getElementById('map-svg-wrap');
  const svg=document.getElementById('map-svg');
  const W=wrap.clientWidth||window.innerWidth;
  const H=wrap.clientHeight||(window.innerHeight-48);
  const cx=W/2,cy=H/2;
  const hT=TOPICS.filter(t=>t.leg==='H');
  const lT=TOPICS.filter(t=>t.leg==='L');
  const rT=TOPICS.filter(t=>t.leg==='R');
  function vis(t){ if(mapFilter==='all')return true; if(mapFilter==='done')return topicDone(t.id); return t.leg===mapFilter; }
  const legs=[
    {topics:hT,angle:-90,spread:115,color:'#b57bee'},
    {topics:lT,angle:150,spread:110,color:'#00e5c3'},
    {topics:rT,angle:30,spread:90,color:'#ff8c42'},
  ];
  const CX=55,R_INNER=210,R_OUTER=340,NR=16;
  let lines='',nodes='',labels='';
  legs.forEach(leg=>{
    const vt=leg.topics.filter(vis); if(!vt.length)return;
    const aRad=leg.angle*(Math.PI/180),sRad=leg.spread*(Math.PI/180);
    const half=Math.ceil(vt.length/2),inner=vt.slice(0,half),outer=vt.slice(half);
    const axEnd=R_INNER*0.6;
    lines+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(aRad)*axEnd}" y2="${cy+Math.sin(aRad)*axEnd}" stroke="${leg.color}" stroke-width="1.2" opacity="0.35"/>`;
    inner.forEach((t,i)=>{
      const off=inner.length>1?(i/(inner.length-1)-0.5):0;
      const ang=aRad+off*sRad*0.7;
      const nx=cx+Math.cos(ang)*R_INNER,ny=cy+Math.sin(ang)*R_INNER;
      const done=topicDone(t.id),fc=done?'#06d6a0':leg.color,bg=done?'rgba(6,214,160,.12)':lbg(t.leg);
      lines+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${leg.color}" stroke-width="0.5" opacity="0.15"/>`;
      nodes+=nodeEl(t,nx,ny,NR,fc,bg,done);
    });
    outer.forEach((t,i)=>{
      const off=outer.length>1?(i/(outer.length-1)-0.5):0;
      const ang=aRad+off*sRad;
      const nx=cx+Math.cos(ang)*R_OUTER,ny=cy+Math.sin(ang)*R_OUTER;
      const done=topicDone(t.id),fc=done?'#06d6a0':leg.color,bg=done?'rgba(6,214,160,.12)':lbg(t.leg);
      lines+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${leg.color}" stroke-width="0.4" opacity="0.1"/>`;
      nodes+=nodeEl(t,nx,ny,NR,fc,bg,done);
    });
    const lx=cx+Math.cos(aRad)*(R_OUTER+36),ly=cy+Math.sin(aRad)*(R_OUTER+36);
    labels+=`<text x="${lx}" y="${ly}" text-anchor="middle" font-family="Syne,sans-serif" font-size="10" font-weight="800" fill="${leg.color}" opacity="0.8">${leg.color==='#b57bee'?'HORIZONTAL (54)':leg.color==='#00e5c3'?'LEFT LEG (53)':'RIGHT LEG (32)'}</text>`;
  });
  function nodeEl(t,nx,ny,r,fc,bg,done){
    const sn=t.name.length>18?t.name.substring(0,16)+'…':t.name;
    return`<g onclick="openTopic('${t.id}')" style="cursor:pointer">
      <circle cx="${nx}" cy="${ny}" r="${r}" fill="${bg}" stroke="${fc}" stroke-width="${done?2:1}" opacity="${done?1:.82}"/>
      ${done?`<circle cx="${nx}" cy="${ny}" r="${r+4}" fill="none" stroke="${fc}" stroke-width="0.6" opacity="0.22" stroke-dasharray="2,3"/>`:``}
      <text x="${nx}" y="${ny-4}" text-anchor="middle" font-family="Inconsolata,monospace" font-size="7.5" font-weight="700" fill="${fc}">${t.id}</text>
      <text x="${nx}" y="${ny+5}" text-anchor="middle" font-family="Syne,sans-serif" font-size="6" fill="#8892b0">${esc(sn.split(' ').slice(0,2).join(' '))}</text>
      <text x="${nx}" y="${ny+13}" text-anchor="middle" font-family="Inconsolata,monospace" font-size="7" fill="${done?'#06d6a0':'#4a5568'}">${done?'✓':topicStatus(t.id).substring(0,2)}</text>
    </g>`;
  }
  const tot=Math.round((doneCount()/139)*100);
  const center=`
    <circle cx="${cx}" cy="${cy}" r="${CX}" fill="#090d1f" stroke="#b57bee" stroke-width="1.5"/>
    <circle cx="${cx}" cy="${cy}" r="${CX+10}" fill="none" stroke="#00e5c3" stroke-width="0.6" opacity="0.3"/>
    <text x="${cx}" y="${cy-14}" text-anchor="middle" font-family="Syne,sans-serif" font-size="26" font-weight="800" fill="#b57bee">π</text>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-family="Inconsolata,monospace" font-size="9.5" fill="#dce7f8" font-weight="700">SA Upskill</text>
    <text x="${cx}" y="${cy+17}" text-anchor="middle" font-family="Inconsolata,monospace" font-size="9" fill="#00e5c3">${tot}%</text>
    <text x="${cx}" y="${cy+29}" text-anchor="middle" font-family="Inconsolata,monospace" font-size="7.5" fill="#4a5568">${doneCount()}/139</text>`;
  svg.innerHTML=`<defs><radialGradient id="bgG" cx="50%" cy="50%"><stop offset="0%" stop-color="#0a1020"/><stop offset="100%" stop-color="#050810"/></radialGradient></defs>
  <rect width="100%" height="100%" fill="url(#bgG)"/>
  <g id="map-g" transform="translate(${mt.x},${mt.y}) scale(${mt.s})">${lines}${center}${nodes}${labels}</g>`;
  const w=document.getElementById('map-svg-wrap');
  w.onmousedown=e=>{mDrag=true;mLast={x:e.clientX,y:e.clientY};e.preventDefault();};
  w.onmousemove=e=>{if(!mDrag)return;mt.x+=e.clientX-mLast.x;mt.y+=e.clientY-mLast.y;mLast={x:e.clientX,y:e.clientY};applyMT();};
  w.onmouseup=()=>mDrag=false;
  w.onmouseleave=()=>mDrag=false;
  w.onwheel=e=>{e.preventDefault();mt.s=Math.max(.2,Math.min(4,mt.s*(e.deltaY>0?.88:1.12)));applyMT();};
  w.ontouchstart=e=>{mDrag=true;mLast={x:e.touches[0].clientX,y:e.touches[0].clientY};};
  w.ontouchmove=e=>{if(!mDrag)return;mt.x+=e.touches[0].clientX-mLast.x;mt.y+=e.touches[0].clientY-mLast.y;mLast={x:e.touches[0].clientX,y:e.touches[0].clientY};applyMT();e.preventDefault();};
  w.ontouchend=()=>mDrag=false;
}
function applyMT(){ const g=document.getElementById('map-g');if(g)g.setAttribute('transform',`translate(${mt.x},${mt.y}) scale(${mt.s})`); }
function mapZoom(f){ mt.s=Math.max(.3,Math.min(3,mt.s*f));applyMT(); }
function mapReset(){ mt={x:0,y:0,s:1};applyMT(); }
function setMapFilter(f){
  mapFilter=f;
  document.querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('mf-'+f)?.classList.add('on');

}

function renderAssessBody(){

function startAssess(w){ assessRunning=true;assessTL=600;renderAssessBody(); }
function startAssessTimer(w){
  if(assessTimer)clearInterval(assessTimer);
  assessTimer=setInterval(()=>{
    assessTL--;
    const el=document.getElementById('quiz-timer');
    if(el){const m=Math.floor(assessTL/60).toString().padStart(2,'0'),s=(assessTL%60).toString().padStart(2,'0');el.textContent=m+':'+s;if(assessTL<120)el.classList.add('urgent');}

  },1000);

function submitAssess(w){
  if(assessTimer)clearInterval(assessTimer);
  assessRunning=false;
  const a=ASSESSMENTS.find(x=>x.w===w);
  const filled=a.qs.filter((_,i)=>(S.assessAnswers[w+'-'+i]||'').trim().length>40).length;

      <div class="topic-name">${esc(t.name)}</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
      <select class="status-sel" id="st-sel" onchange="changeStatus('${id}',this.value)">
        ${['Not Started','In Progress','Done','Needs Revisit'].map(s=>`<option value="${s}" ${st===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;font-weight:700">
        <input type="checkbox" ${done?'checked':''} onchange="markDone('${id}',this.checked);document.getElementById('st-sel').value=topicStatus('${id}')" style="cursor:pointer;width:15px;height:15px;accent-color:var(--done)">
        <span style="color:${done?'var(--done)':'var(--t2)'}">Mark Complete (+50 XP)</span>
      </label>
      ${done?`<span class="tag" style="background:rgba(6,214,160,.1);color:var(--done);border:1px solid rgba(6,214,160,.3)">✅ Done · +50 XP</span>`:''}
    </div>
    <div class="ts">
      <div class="ts-label">Key Insight — Commercial Value</div>
      <div class="ts-insight">💡 ${esc(t.insight)}</div>
    </div>
    <div class="ts">
      <div class="ts-label">Hands-On Activity</div>
      <span class="handson-tag h-${t.handson}">${handsonLabel}</span>
      <div class="ts-box">${esc(t.activity)}</div>
    </div>
    <div class="ts">
      <div class="ts-label">Your Notes</div>
      <textarea class="notes-area" id="notes-${id}" placeholder="Write anything — key learnings, customer scenarios, connections to other topics...">${esc(note)}</textarea>
    </div>
    <div class="ts">
      <div class="ts-label">Apple Notes / Resource URL</div>
      <div class="url-row">
        <input class="url-inp" id="url-${id}" type="url" placeholder="Paste your Apple Notes or resource link..." value="${esc(url)}">
        ${url?`<a class="url-open-btn" href="${esc(url)}" target="_blank" rel="noopener">📝 Open ↗</a>`:''}
      </div>
    </div>
    ${connected.length?`<div class="ts"><div class="ts-label">Studied Same Day</div><div class="conn-row">${connected.map(cid=>{const ct=TOPICS.find(x=>x.id===cid);return ct?`<span class="conn-chip" onclick="saveModalAndOpen('${cid}')">${ct.id} — ${ct.name.substring(0,25)}</span>`:''}).join('')}</div></div>`:''}
    <button class="modal-save" onclick="saveModal('${id}')">💾 Save Notes</button>`;
  document.getElementById('topic-overlay').classList.add('on');
}
function saveModal(id){
  const notes=document.getElementById('notes-'+id);
  const url=document.getElementById('url-'+id);
  if(notes) S.notes[id]=notes.value;
  if(url) S.url[id]=url.value.trim();
  schedSave();
  const btn=document.querySelector('.modal-save');
  if(btn){btn.textContent='✅ Saved!';setTimeout(()=>{btn.textContent='💾 Save Notes';},1500);}
  if(currentTab==='plan') renderPlan();
  if(currentTab==='kanban') renderKanban();
  if(currentTab==='dash') renderDash();
  renderMap(); refreshNav();
}
function saveModalAndOpen(newId){ if(curTopicId)saveModal(curTopicId); closeModal(); setTimeout(()=>openTopic(newId),100); }
function closeModal(){
  if(curTopicId){
    const notes=document.getElementById('notes-'+curTopicId);
    const url=document.getElementById('url-'+curTopicId);
    if(notes) S.notes[curTopicId]=notes.value;
    if(url) S.url[curTopicId]=url.value.trim();
    schedSave();
  }
  document.getElementById('topic-overlay').classList.remove('on');
  curTopicId=null;
  if(currentTab==='plan') renderPlan();
  if(currentTab==='kanban') renderKanban();
  if(currentTab==='dash') renderDash();
  renderMap(); refreshNav();
}
document.getElementById('topic-overlay').onclick=e=>{if(e.target===document.getElementById('topic-overlay'))closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ═══════════════════════════════════
// NAV
// ═══════════════════════════════════
let currentTab='map';
function showTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  currentTab=tab;
  document.getElementById('pg-'+tab)?.classList.add('on');
  document.querySelector('.t-'+tab)?.classList.add('on');
  if(tab==='map') renderMap();
  if(tab==='plan') renderPlan();
  if(tab==='kanban') renderKanban();
  if(tab==='dash') renderDash();
  if(tab==='assess'){ renderAssessNav(); renderAssessBody(); }
  if(tab==='p2') renderP2();
}

// BOOT
// ═══════════════════════════════════
function init(){
  updateStreak();
  initSync();
  renderMap();
}
init();
window.addEventListener('resize',()=>{ if(currentTab==='map') renderMap(); });
